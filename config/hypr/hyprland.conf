# Monitores
monitor=,preferred,auto,auto
# Programas al Iniciar
# exec-once = kitty
exec-once = waybar 
exec-once = dbus-update-activation-environment --systemd WAYLAND_DIPLAY XDG_CURRENT_DESKTOP
exec-once = awww-daemon
exec-once = eww daemon &
ecec-once = mako
# Variables de Teclas
$mainMod = SUPER

# --- Atajos del Sistema Básicos ---
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive, 
bind = $mainMod, Ñ, exit, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, P, pseudo, # dwindle,
bind = $mainMod, O, layoutmsg, togglesplit,
bind = $mainMod, R, exec, rofi -show drun -theme ~/.config/rofi/config.rasi
bind = $mainMod, E, exec, dolphin
# Cambiar de escritorio
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
# Mover la ventana activa a un ecritorio
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
# Intercambio de ventanas
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, L, swapwindow, r

# RUTA AL SCRIPT
$wallScript = ~/.config/hypr/wallpaper.sh
bind = SUPER, B, exec, $wallScript next
bind = SUPER, N, exec, $wallScript prev
# Moverse con el mause
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# Mover el foco entre ventanas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Rofi
bind = $mainMod, Escape, exec, ~/.config/rofi/menus/powermenu
# Volumen 
binde = , F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

input {
kb_layout = latam

numlock_by_default = true

follow_mouse =1
sensitivity  = 0  
}

general {
	gaps_in = 5
	gaps_out = 10
	border_size = 2
	col.active_border = rgba(5b2a62ff)
	col.inactive_border = rgba(9d6b99ff)
}

animations {
    enabled = true

    bezier = cleanCurve, 0.16, 1, 0.3, 1

    animation = windows, 1, 5, cleanCurve, slide
    animation = windowsOut, 1, 5, cleanCurve, slide
    animation = fade, 1, 5, cleanCurve
    animation = workspaces, 1, 4, cleanCurve, slide
}

decoration {
    rounding = 20

    active_opacity = 0.75
    inactive_opacity = 0.50

    shadow:enabled = true
    shadow:range = 15
    shadow:render_power = 3
    shadow:color = rgba(9d6b9955)

    blur{
	enabled = true
	size = 5
	passes = 5
	new_optimizations = true
	xray = false
     }
}
#Reglas de ventana
windowrule {
    name = firefox-custom
    match:class = ^(firefox)$

    opaque = true
    no_blur = true
}
